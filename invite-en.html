<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LuckyChainss – Invite Friends</title>
  <style>
    /* Тот же CSS */
  </style>
</head>
<body>

  <div class="header">
    <div class="back-btn" onclick="history.back()">←</div>
    <div class="title">Invite Friends</div>
    <div></div>
  </div>

  <div class="balance-section">
    <div class="balance-info">
      <div class="balance-icon">💎</div>
      <div>
        <div>Your balance</div>
        <div class="balance-value">0.000</div>
      </div>
    </div>
    <button class="topup-btn" onclick="window.location.href='topup-en.html'">Top up</button>
  </div>

  <div class="referral-section">
    <div class="referral-block">
      <div class="referral-title">Get <span class="referral-percent">10%</span></div>
      <p class="referral-text">by inviting friends<br>From each of their top-ups</p>
    </div>

    <button class="action-btn">↷ Invite Friends</button>
    <button class="action-btn copy-btn">📋 Copy Referral Link</button>

    <div class="stats">
      <div>Total Earned</div>
      <div class="stats-value">0.000 💎</div>
    </div>

    <div class="referrals-list">
      <div class="stats-value">My Referrals</div>
      <div class="referrals-empty">No invitations yet</div>
    </div>
  </div>

  <div class="bottom-nav">
    <div class="nav-item" onclick="window.location.href='inventory-en.html'">Inventory</div>
    <div class="nav-item active" onclick="window.location.href='invite-en.html'">Invite</div>
    <div class="nav-item" onclick="window.location.href='english.html'">Home</div>
    <div class="nav-item" onclick="window.location.href='rating-en.html'">Rating</div>
    <div class="nav-item" onclick="window.location.href='rewards-en.html'">Rewards</div>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();
  </script>
</body>
</html>
