<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LuckyChainss – Рейтинг</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0d1117;
      color: white;
      overflow-x: hidden;
      padding-bottom: 90px;
    }
    .header {
      background: #161b22;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #30363d;
    }
    .back-btn {
      font-size: 24px;
      color: #8b949e;
      cursor: pointer;
    }
    .title {
      font-size: 18px;
      font-weight: bold;
    }
    .balance-section {
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #161b22;
      border-bottom: 1px solid #30363d;
    }
    .balance-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .balance-icon {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, #a78bfa, #7c3aed);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }
    .balance-value {
      font-size: 20px;
      font-weight: bold;
      color: #a78bfa;
    }
    .topup-btn {
      background: #a78bfa;
      color: black;
      padding: 10px 20px;
      border-radius: 30px;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }
    .rating-header {
      padding: 20px 16px;
      text-align: center;
    }
    .rating-title {
      font-size: 28px;
      margin: 0 0 8px;
      color: #a78bfa;
    }
    .timer {
      background: #2d1b47;
      border-radius: 30px;
      padding: 12px 20px;
      display: inline-block;
      font-size: 18px;
      margin: 12px 0;
    }
    .participants {
      font-size: 16px;
      color: #d1d5db;
    }
    .leaderboard {
      padding: 0 16px;
    }
    .leaderboard-item {
      background: #1f2937;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .rank {
      font-size: 24px;
      font-weight: bold;
      min-width: 40px;
      text-align: center;
    }
    .avatar {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: #a78bfa;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: bold;
    }
    .username {
      flex: 1;
      font-size: 18px;
      font-weight: bold;
    }
    .prize-icon {
      width: 48px;
      height: 48px;
      background: #FFD700;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }
    .score {
      font-size: 20px;
      font-weight: bold;
      color: #a78bfa;
      min-width: 100px;
      text-align: right;
    }
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #161b22;
      border-top: 1px solid #30363d;
      display: flex;
      justify-content: space-around;
      padding: 10px 0;
      font-size: 12px;
    }
    .nav-item {
      text-align: center;
      cursor: pointer;
      color: #8b949e;
    }
    .nav-item.active {
      color: #a78bfa;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="back-btn" onclick="history.back()">←</div>
    <div class="title">Рейтинг</div>
    <div></div>
  </div>

  <div class="balance-section">
    <div class="balance-info">
      <div class="balance-icon">💎</div>
      <div>
        <div>Ваш баланс</div>
        <div class="balance-value">0.002</div>
      </div>
    </div>
    <button class="topup-btn">Пополнить</button>
  </div>

  <div class="rating-header">
    <h2 class="rating-title">Рейтинг</h2>
    <div class="timer">Заканчивается через: 6d 22h 19m 38s</div>
    <div class="participants">Участников: 250</div>
    <p style="color:#d1d5db; margin-top:12px;">Соревнуйтесь с другими пользователями и выигрывайте потрясающие призы!</p>
  </div>

  <div class="leaderboard">
    <div class="leaderboard-item">
      <div class="rank">1</div>
      <div class="avatar" style="background:#FFD700;">1</div>
      <div class="username">qd***sa</div>
      <div class="prize-icon">👜</div>
      <div class="score">928.1K</div>
    </div>
    <div class="leaderboard-item">
      <div class="rank">2</div>
      <div class="avatar" style="background:#00CED1;">2</div>
      <div class="username">Wh***26</div>
      <div class="prize-icon">🧴</div>
      <div class="score">182.4K</div>
    </div>
    <!-- Добавь остальные места по аналогии -->
    <div class="leaderboard-item" style="background:#2d3748;">
      <div class="rank">...</div>
      <div class="avatar" style="background:#8B5CF6;">999+</div>
      <div class="username">SHRAM+</div>
      <div class="prize-icon">❌</div>
      <div class="score">0</div>
    </div>
  </div>

  <div class="bottom-nav">
    <div class="nav-item" onclick="window.location.href='inventory.html'">Инвентарь</div>
    <div class="nav-item" onclick="window.location.href='invite.html'">Пригласить</div>
    <div class="nav-item" onclick="window.location.href='index.html'">Главная</div>
    <div class="nav-item active" onclick="window.location.href='rating.html'">Рейтинг</div>
    <div class="nav-item" onclick="window.location.href='rewards.html'">Награды</div>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();
  </script>
</body>
</html>
