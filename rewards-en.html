<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LuckyChainss – Rewards</title>
  <style>
    /* Тот же CSS */
  </style>
</head>
<body>

  <div class="header">
    <div class="back-btn" onclick="history.back()">←</div>
    <div class="title">Rewards</div>
    <div></div>
  </div>

  <div class="balance-section">
    <div class="balance-info">
      <div class="balance-icon">💎</div>
      <div>
        <div>Your balance</div>
        <div class="balance-value">0.000</div>
      </div>
    </div>
    <button class="topup-btn" onclick="window.location.href='topup-en.html'">Top up</button>
  </div>

  <div class="tabs">
    <button class="tab-btn" onclick="openTab('tasks')">Tasks</button>
    <button class="tab-btn active" onclick="openTab('giveaways')">Giveaways</button>
  </div>

  <div id="tasks" class="tab-content">
    <div style="text-align:center; padding:40px 16px; color:#8b949e;">
      Switch to Tasks tab to view available tasks
    </div>
  </div>

  <div id="giveaways" class="tab-content active">
    <div class="giveaways-empty">
      <div class="gift-icon">🎁</div>
      <h2 class="giveaways-title">Giveaways</h2>
      <div class="timer" id="giveawayTimer">Next giveaway in: calculating...</div>
      <p>No active giveaways</p>
      <p>Check back later for exciting giveaways!</p>
      <ul class="giveaways-list">
        <li>Big prize pools</li>
        <li>Easy to participate</li>
        <li>Multiple winners</li>
      </ul>
    </div>
  </div>

  <div class="bottom-nav">
    <div class="nav-item" onclick="window.location.href='inventory-en.html'">Inventory</div>
    <div class="nav-item" onclick="window.location.href='invite-en.html'">Invite</div>
    <div class="nav-item" onclick="window.location.href='english.html'">Home</div>
    <div class="nav-item" onclick="window.location.href='rating-en.html'">Rating</div>
    <div class="nav-item active" onclick="window.location.href='rewards-en.html'">Rewards</div>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    function openTab(tabId) {
      document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      document.getElementById(tabId).classList.add('active');
      document.querySelector(`button[onclick="openTab('${tabId}')"]`).classList.add('active');
    }

    function startGiveawayTimer() {
      const endDate = new Date('2026-03-08T23:59:59').getTime();
      const timerEl = document.getElementById('giveawayTimer');

      const interval = setInterval(() => {
        const now = new Date().getTime();
        const distance = endDate - now;

        if (distance < 0) {
          timerEl.innerHTML = "Giveaway ended!";
          clearInterval(interval);
          return;
        }

        const days = Math.floor(distance / (1000 * 60 * 60 * 24));
        const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((distance % (1000 * 60)) / 1000);

        timerEl.innerHTML = `Next giveaway in: ${days}d ${hours}h ${minutes}m ${seconds}s`;
      }, 1000);
    }

    startGiveawayTimer();
  </script>
</body>
</html>
