<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LuckyChainss – Тест языка</title>
  <style>
    body { margin:0; background:#0d1117; color:white; font-family:Arial,sans-serif; text-align:center; padding:20px; }
    .header { background:#161b22; padding:20px; margin:-20px -20px 30px; }
    .logo { font-size:28px; color:#FFD700; }
    .settings-badge { font-size:24px; cursor:pointer; }
    #settingsModal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:1000; align-items:center; justify-content:center; }
    .modal-content { background:#1f2937; padding:40px; border-radius:20px; width:80%; }
    .lang-btn { padding:15px 30px; margin:10px; font-size:18px; border-radius:12px; border:none; cursor:pointer; }
    .lang-btn.ru { background:#FFD700; color:black; }
    .lang-btn.en { background:#30363d; color:white; }
  </style>
</head>
<body>

  <div class="header">
    <span class="settings-badge" onclick="openSettings()">⚙️</span>
    <div class="logo" id="logoText" data-key="logo">LuckyChainss</div>
  </div>

  <p id="testText" data-key="test">Это текст для теста смены языка</p>

  <!-- Модалка -->
  <div id="settingsModal">
    <div class="modal-content">
      <h2 data-key="settings">Настройки</h2>
      <p data-key="selectLanguage">Выберите язык:</p>
      <button class="lang-btn ru" onclick="setLanguage('ru')">Русский</button>
      <button class="lang-btn en" onclick="setLanguage('en')">English</button>
      <br><br>
      <button onclick="closeSettings()" style="padding:12px 30px; background:#FF5555; color:white; border:none; border-radius:12px;">Закрыть</button>
    </div>
  </div>

  <script>
    console.log('✅ Скрипт загружен');

    function openSettings() {
      console.log('⚙️ Открываем модалку');
      document.getElementById('settingsModal').style.display = 'flex';
    }

    function closeSettings() {
      document.getElementById('settingsModal').style.display = 'none';
    }

    const translations = {
      ru: { logo: "LuckyChainss", test: "Это текст для теста смены языка", settings: "Настройки", selectLanguage: "Выберите язык:" },
      en: { logo: "LuckyChainss", test: "This is a language switch test", settings: "Settings", selectLanguage: "Select language:" }
    };

    let currentLang = localStorage.getItem('lang') || 'ru';

    function setLanguage(lang) {
      console.log('🖱️ Клик по языку:', lang);
      alert('✅ КНОПКА СРАБОТАЛА!\nЯзык: ' + lang.toUpperCase());

      currentLang = lang;
      localStorage.setItem('lang', lang);

      document.querySelectorAll('[data-key]').forEach(el => {
        const key = el.dataset.key;
        if (translations[lang][key]) {
          el.textContent = translations[lang][key];
        }
      });

      closeSettings();
    }

    // Инициализация
    console.log('Текущий язык:', currentLang);
    document.querySelectorAll('[data-key]').forEach(el => {
      const key = el.dataset.key;
      if (translations[currentLang][key]) el.textContent = translations[currentLang][key];
    });
  </script>
</body>
</html>
