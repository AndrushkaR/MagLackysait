<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LuckyChainss</title>
  <style>
    body { margin:0; background:#0d1117; color:white; font-family:Arial,sans-serif; }
    .header {
      background:#161b22; padding:15px; display:flex; align-items:center; gap:15px;
      border-bottom:1px solid #333;
    }
    .avatar-container { position:relative; width:52px; height:52px; }
    .avatar { width:100%; height:100%; border-radius:50%; border:3px solid #FFD700; object-fit:cover; }
    .settings-badge {
      position:absolute; bottom:-4px; right:-4px; width:26px; height:26px;
      background:#161b22; border:3px solid #FFD700; border-radius:50%;
      display:flex; align-items:center; justify-content:center; font-size:16px;
      cursor:pointer;
    }
    .logo { font-size:24px; font-weight:bold; color:#FFD700; flex:1; }
    #settingsModal {
      display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:1000;
      align-items:center; justify-content:center;
    }
    .modal-content {
      background:#1f2937; padding:30px; border-radius:16px; width:85%; text-align:center;
    }
  </style>
</head>
<body onload="console.log('JS загружен!'); alert('✅ JS работает! Страница полностью загружена.')">

  <div class="header">
    <div class="avatar-container">
      <img id="userAvatar" class="avatar" src="https://via.placeholder.com/52?text=AVA" alt="Avatar">
      <!-- КЛИК ПРЯМО ЗДЕСЬ — без JS -->
      <div class="settings-badge" onclick="openSettings()">⚙️</div>
    </div>
    <div class="logo">LuckyChainss</div>
  </div>

  <div id="settingsModal">
    <div class="modal-content">
      <h2 style="color:#FFD700;">Настройки</h2>
      <p>Здесь будет выбор языка (Русский / English)</p>
      <button onclick="closeSettings()" style="margin-top:20px;padding:12px 30px;background:#FF5555;color:white;border:none;border-radius:12px;font-size:16px;">Закрыть</button>
    </div>
  </div>

  <script>
    function openSettings() {
      alert('✅ Шестерёнка нажата! Модалка открывается...');
      document.getElementById('settingsModal').style.display = 'flex';
    }
    function closeSettings() {
      document.getElementById('settingsModal').style.display = 'none';
    }

    // Аватарка из Telegram
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();
    const user = tg.initDataUnsafe?.user || {};
    document.getElementById('userAvatar').src = user.photo_url || `https://via.placeholder.com/52/FFD700/000?text=${user.username?.[0]?.toUpperCase() || 'U'}`;
  </script>
</body>
</html>
