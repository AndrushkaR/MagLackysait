<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LuckyChainss – TON Казик</title>
  <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0d1117;
      color: white;
      overflow-x: hidden;
    }
    .header {
      background: #161b22;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid #30363d;
    }
    .avatar-container {
      position: relative;
      width: 48px;
      height: 48px;
      cursor: pointer;
    }
    .avatar {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #FFD700;
    }
    .settings-badge {
      position: absolute;
      bottom: -4px;
      right: -4px;
      width: 20px;
      height: 20px;
      background: #161b22;
      border-radius: 50%;
      border: 2px solid #FFD700;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
    }
    .logo {
      font-size: 22px;
      font-weight: bold;
      color: #FFD700;
      text-shadow: 0 0 10px #FFD70080;
      flex: 1;
    }
    .balance {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(167, 139, 250, 0.2);
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 14px;
    }
    .balance strong { color: #A78BFA; }
    
    /* Модалка настроек */
    #settingsModal {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.8);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .modal-content {
      background: #1f2937;
      padding: 24px;
      border-radius: 16px;
      width: 90%;
      max-width: 320px;
      text-align: center;
    }
    .modal-content h3 { margin: 0 0 16px; color: #FFD700; }
    .lang-btn {
      background: #30363d;
      color: white;
      border: none;
      padding: 12px;
      margin: 8px;
      border-radius: 12px;
      width: 120px;
      cursor: pointer;
      font-size: 16px;
    }
    .lang-btn.active { background: #FFD700; color: black; }
    
    /* Остальные стили как раньше */
    .connect-btn {
      background: #FFD700;
      color: black;
      padding: 12px 24px;
      border-radius: 20px;
      font-weight: bold;
      border: none;
      cursor: pointer;
      width: 90%;
      margin: 16px auto;
      display: block;
      font-size: 18px;
    }
    .connect-btn:disabled { background: #00ff88; }
    
    .live-tabs, .banner, .cases, .bottom-nav { /* твои предыдущие стили */ }
    /* ... (вставь сюда все остальные стили из прошлого кода: live-tabs, banner, cases, bottom-nav и т.д.) */
  </style>
</head>
<body>

  <div class="header">
    <div class="avatar-container" id="avatarContainer">
      <img id="userAvatar" class="avatar" src="https://via.placeholder.com/48?text=AVA" alt="Avatar">
      <div class="settings-badge">⚙️</div>
    </div>
    
    <div class="logo">LuckyChainss</div>
    
    <div class="balance">
      <strong id="tonBalance">0.000</strong> TON
    </div>
  </div>

  <button class="connect-btn" id="connectWallet">Подключить TON-кошелёк</button>

  <!-- Остальной контент: live-tabs, banner, cases, bottom-nav как в предыдущем коде -->

  <!-- Модалка настроек -->
  <div id="settingsModal">
    <div class="modal-content">
      <h3 data-key="settings">Настройки</h3>
      <p data-key="selectLanguage">Выберите язык:</p>
      <button class="lang-btn" data-lang="ru">Русский</button>
      <button class="lang-btn" data-lang="en">English</button>
      <br><br>
      <button onclick="closeSettings()" style="background:#FF5555; color:white; padding:10px 20px; border:none; border-radius:12px; cursor:pointer;">Закрыть</button>
    </div>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    // Получаем данные пользователя из Telegram
    const user = tg.initDataUnsafe.user || {};
    const avatarEl = document.getElementById('userAvatar');
    if (user.photo_url) {
      avatarEl.src = user.photo_url;  // реальная аватарка из Telegram
    } else {
      avatarEl.src = 'https://via.placeholder.com/48/FFD700/000?text=' + (user.username?.[0] || 'U');
    }

    // Открытие настроек по клику на аву
    document.getElementById('avatarContainer').onclick = () => {
      document.getElementById('settingsModal').style.display = 'flex';
    };

    function closeSettings() {
      document.getElementById('settingsModal').style.display = 'none';
    }

    // Переводы
    const translations = {
      ru: {
        settings: "Настройки",
        selectLanguage: "Выберите язык:",
        connectWallet: "Подключить TON-кошелёк",
        connected: "Кошелёк подключён!"
      },
      en: {
        settings: "Settings",
        selectLanguage: "Select language:",
        connectWallet: "Connect TON Wallet",
        connected: "Wallet connected!"
      }
    };

    let currentLang = localStorage.getItem('lang') || 'ru';
    document.documentElement.lang = currentLang;

    function setLanguage(lang) {
      currentLang = lang;
      localStorage.setItem('lang', lang);
      document.querySelectorAll('[data-key]').forEach(el => {
        const key = el.dataset.key;
        if (translations[lang][key]) el.textContent = translations[lang][key];
      });
      document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.lang === lang);
      });
      document.documentElement.lang = lang;
      closeSettings();
    }

    // Инициализация языка
    setLanguage(currentLang);

    // Кнопки языка
    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.onclick = () => setLanguage(btn.dataset.lang);
      btn.classList.toggle('active', btn.dataset.lang === currentLang);
    });

    // TON Connect (как раньше)
    const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
      manifestUrl: 'https://твоя-ссылка.netlify.app/tonconnect-manifest.json'  // ← подставь свою
    });

    const connectButton = document.getElementById('connectWallet');
    const balanceEl = document.getElementById('tonBalance');

    connectButton.onclick = async () => {
      try {
        await tonConnectUI.connectWallet();
        connectButton.textContent = translations[currentLang].connected;
        connectButton.disabled = true;

        const balanceNano = await tonConnectUI.getBalance();
        const balanceTon = (balanceNano / 1_000_000_000).toFixed(4);
        balanceEl.textContent = balanceTon;
      } catch (e) {
        alert('Ошибка: ' + e.message);
      }
    };
  </script>
</body>
</html>
