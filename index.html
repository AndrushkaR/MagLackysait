<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LuckyChainss</title>
  <style>
    body { margin:0; background:#0d1117; color:white; font-family:Arial; }
    .header {
      background:#161b22;
      padding:12px 16px;
      display:flex;
      align-items:center;
      gap:12px;
      border-bottom:1px solid #30363d;
    }
    .avatar-container { position:relative; width:48px; height:48px; }
    .avatar {
      width:100%; height:100%;
      border-radius:50%;
      border:2px solid #FFD700;
      object-fit:cover;
    }
    .settings-badge {
      position:absolute;
      bottom:-4px; right:-4px;
      width:22px; height:22px;
      background:#161b22;
      border:2px solid #FFD700;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:14px;
      cursor:pointer;
      transition:0.2s;
    }
    .settings-badge:hover { transform:scale(1.2); background:#2d3748; }

    #settingsModal {
      display:none;
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.8);
      z-index:1000;
      align-items:center;
      justify-content:center;
    }
    .modal-content {
      background:#1f2937;
      padding:30px;
      border-radius:16px;
      width:85%;
      text-align:center;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="avatar-container">
      <img id="userAvatar" class="avatar" src="https://via.placeholder.com/48?text=AVA" alt="Avatar">
      <div class="settings-badge" id="settingsTrigger">⚙️</div>
    </div>
    <div style="font-size:22px; font-weight:bold; color:#FFD700; flex:1;">LuckyChainss</div>
    <div style="background:rgba(167,139,250,0.2); padding:6px 12px; border-radius:20px;">
      Баланс <strong>0.000 TON</strong>
    </div>
  </div>

  <!-- Модалка -->
  <div id="settingsModal">
    <div class="modal-content">
      <h2 style="color:#FFD700;">Настройки</h2>
      <p>Выберите язык:</p>
      <button style="padding:12px 24px; margin:10px; background:#FFD700; color:black; border:none; border-radius:12px; font-size:16px;">Русский</button>
      <button style="padding:12px 24px; margin:10px; background:#30363d; color:white; border:none; border-radius:12px; font-size:16px;">English</button>
      <br><br>
      <button onclick="document.getElementById('settingsModal').style.display='none'" style="background:#FF5555; color:white; padding:10px 30px; border:none; border-radius:12px;">Закрыть</button>
    </div>
  </div>

  <script>
    console.log('Страница загружена — скрипт работает');

    // Тест клика по шестерёнке
    document.getElementById('settingsTrigger').addEventListener('click', () => {
      console.log('Шестерёнка нажата!');
      alert('Шестерёнка РАБОТАЕТ! ✅\nМодалка должна открыться.');
      document.getElementById('settingsModal').style.display = 'flex';
    });

    // Аватарка из Telegram
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();
    const user = tg.initDataUnsafe?.user || {};
    document.getElementById('userAvatar').src = user.photo_url || `https://via.placeholder.com/48/FFD700/000?text=${user.username?.[0]?.toUpperCase() || 'U'}`;
  </script>
</body>
</html>
