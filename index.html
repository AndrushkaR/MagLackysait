<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LuckyChainss</title>
  <style>
    body { margin:0; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:#0d1117; color:white; overflow-x:hidden; }
    .header {
      background:#161b22; padding:12px 16px; display:flex; align-items:center; gap:12px;
      border-bottom:1px solid #30363d;
    }
    .avatar-container { position:relative; width:48px; height:48px; }
    .avatar { width:100%; height:100%; border-radius:50%; object-fit:cover; border:2px solid #FFD700; }
    .settings-badge {
      position:absolute; bottom:-4px; right:-4px; width:22px; height:22px;
      background:#161b22; border:2px solid #FFD700; border-radius:50%;
      display:flex; align-items:center; justify-content:center; font-size:14px;
      cursor:pointer; transition:0.2s;
    }
    .settings-badge:hover { transform:scale(1.2); background:#2d3748; }
    .logo { font-size:22px; font-weight:bold; color:#FFD700; text-shadow:0 0 10px #FFD70080; flex:1; }
    .balance { background:rgba(167,139,250,0.2); padding:6px 12px; border-radius:20px; font-size:14px; }
    .balance strong { color:#A78BFA; }

    /* Модалка */
    #settingsModal {
      display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:1000;
      align-items:center; justify-content:center;
    }
    .modal-content {
      background:#1f2937; padding:24px; border-radius:16px; width:85%; max-width:340px;
      text-align:center; border:1px solid #FFD70040;
    }
    .modal-content h3 { color:#FFD700; margin:0 0 20px; }
    .lang-btn {
      background:#30363d; color:white; border:none; padding:12px 24px; margin:8px;
      border-radius:12px; cursor:pointer; font-size:16px; min-width:110px;
    }
    .lang-btn.active { background:#FFD700; color:black; font-weight:bold; }
    .close-btn { background:#FF5555; color:white; border:none; padding:10px 30px; border-radius:12px; cursor:pointer; }
  </style>
</head>
<body>

  <div class="header">
    <div class="avatar-container">
      <img id="userAvatar" class="avatar" src="https://via.placeholder.com/48?text=AVA" alt="Avatar">
      <div class="settings-badge" id="settingsTrigger">⚙️</div>
    </div>
    <div class="logo">LuckyChainss</div>
    <div class="balance">
      <strong>0.000</strong> TON
    </div>
  </div>

  <!-- Модалка настроек -->
  <div id="settingsModal">
    <div class="modal-content">
      <h3 data-key="settings">Настройки</h3>
      <p data-key="selectLanguage">Выберите язык:</p>
      <button class="lang-btn active" data-lang="ru">Русский</button>
      <button class="lang-btn" data-lang="en">English</button>
      <br><br>
      <button class="close-btn" onclick="closeSettings()">Закрыть</button>
    </div>
  </div>

  <script>
    console.log('✅ Страница загружена — скрипт работает');

    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    // Аватарка из Telegram
    const user = tg.initDataUnsafe?.user || {};
    document.getElementById('userAvatar').src = user.photo_url || `https://via.placeholder.com/48/FFD700/000?text=${user.username?.[0]?.toUpperCase() || 'U'}`;

    // Шестерёнка — главный обработчик
    document.getElementById('settingsTrigger').addEventListener('click', () => {
      console.log('⚙️ Шестерёнка нажата!');
      alert('✅ Шестерёнка РАБОТАЕТ!\nСейчас откроется окно настроек');
      document.getElementById('settingsModal').style.display = 'flex';
    });

    function closeSettings() {
      document.getElementById('settingsModal').style.display = 'none';
    }

    // Смена языка (сохраняется навсегда)
    const translations = {
      ru: { settings: "Настройки", selectLanguage: "Выберите язык:" },
      en: { settings: "Settings", selectLanguage: "Select language:" }
    };

    let currentLang = localStorage.getItem('lang') || 'ru';

    function setLanguage(lang) {
      currentLang = lang;
      localStorage.setItem('lang', lang);
      document.documentElement.lang = lang;

      document.querySelectorAll('[data-key]').forEach(el => {
        const key = el.dataset.key;
        if (translations[lang][key]) el.textContent = translations[lang][key];
      });

      document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
      closeSettings();
    }

    setLanguage(currentLang);

    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.addEventListener('click', () => setLanguage(btn.dataset.lang));
    });
  </script>
</body>
</html>
