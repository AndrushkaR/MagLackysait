  <div class="bottom-nav">

  <!-- Настройки -->
  <div id="settingsModal">
    <div class="modal-content">
      <h3>Настройки</h3>
      <p>Выберите язык:</p>
      <button class="lang-btn" onclick="window.location.href='english.html'">English</button>
      <button class="lang-btn active" onclick="closeSettings()">Русский</button>
      <br><br>
      <button class="lang-btn" onclick="openAvatarModal()">Поменять аватарку</button>
      <br><br>
      <button class="close-btn" onclick="closeSettings()">Закрыть</button>
    </div>
  </div>

  <!-- Выбор аватарки -->
  <div id="avatarModal">
    <div class="modal-content">
      <h3>Выберите аватарку</h3>
      <div style="display:flex; flex-wrap:wrap; justify-content:center; gap:15px; margin:25px 0;">
        <!-- ЗДЕСЬ ВАЖНО: используем прямые ссылки на GitHub -->
        <div class="avatar-option" onclick="changeAvatar('https://raw.githubusercontent.com/AndrushkaR/MagLackysait/main/avatars/avatar1.png')">
          <img src="https://raw.githubusercontent.com/AndrushkaR/MagLackysait/main/avatars/avatar1.png" alt="Avatar 1">
        </div>
        <div class="avatar-option" onclick="changeAvatar('https://raw.githubusercontent.com/AndrushkaR/MagLackysait/main/avatars/avatar2.png')">
          <img src="https://raw.githubusercontent.com/AndrushkaR/MagLackysait/main/avatars/avatar2.png" alt="Avatar 2">
        </div>
        <div class="avatar-option" onclick="changeAvatar('https://raw.githubusercontent.com/AndrushkaR/MagLackysait/main/avatars/avatar3.png')">
          <img src="https://raw.githubusercontent.com/AndrushkaR/MagLackysait/main/avatars/avatar3.png" alt="Avatar 3">
        </div>
        <div class="avatar-option" onclick="changeAvatar('https://raw.githubusercontent.com/AndrushkaR/MagLackysait/main/avatars/avatar4.png')">
          <img src="https://raw.githubusercontent.com/AndrushkaR/MagLackysait/main/avatars/avatar4.png" alt="Avatar 4">
        </div>
        <div class="avatar-option" onclick="changeAvatar('https://raw.githubusercontent.com/AndrushkaR/MagLackysait/main/avatars/avatar5.png')">
          <img src="https://raw.githubusercontent.com/AndrushkaR/MagLackysait/main/avatars/avatar5.png" alt="Avatar 5">
        </div>
      </div>
      <button class="close-btn" onclick="closeAvatarModal()">Закрыть</button>
    </div>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const avatarElement = document.getElementById('userAvatar');

    // Загружаем сохраненную аватарку или ставим плейсхолдер
    const saved = localStorage.getItem('selectedAvatar');
    if (saved) {
      avatarElement.src = saved;
    } else {
      avatarElement.src = 'https://via.placeholder.com/52/1f2937/FFD700?text=?';
    }
function openSettings() { 
      document.getElementById('settingsModal').style.display = 'flex'; 
    }
    
    function closeSettings() { 
      document.getElementById('settingsModal').style.display = 'none'; 
    }
    
    function openAvatarModal() { 
      closeSettings(); 
      document.getElementById('avatarModal').style.display = 'flex'; 
    }
    
    function closeAvatarModal() { 
      document.getElementById('avatarModal').style.display = 'none'; 
    }

    function changeAvatar(src) {
      avatarElement.src = src;           // сразу меняем аватарку в шапке
      localStorage.setItem('selectedAvatar', src);  // сохраняем
      
      // Визуально подсвечиваем выбранную аватарку
      document.querySelectorAll('.avatar-option').forEach(opt => {
        opt.classList.remove('selected');
      });
      event.currentTarget.classList.add('selected');
      
      closeAvatarModal();                // закрываем модалку
    }
  </script>
