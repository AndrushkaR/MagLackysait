<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LuckyChainss – Пригласить друзей</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0d1117;
      color: white;
      overflow-x: hidden;
      padding-bottom: 90px;
    }
    .header {
      background: #161b22;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #30363d;
    }
    .back-btn {
      font-size: 24px;
      color: #8b949e;
      cursor: pointer;
    }
    .title {
      font-size: 18px;
      font-weight: bold;
    }
    .balance-section {
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #161b22;
      border-bottom: 1px solid #30363d;
    }
    .balance-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .balance-icon {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, #a78bfa, #7c3aed);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }
    .balance-value {
      font-size: 20px;
      font-weight: bold;
      color: #a78bfa;
    }
    .topup-btn {
      background: #a78bfa;
      color: black;
      padding: 10px 20px;
      border-radius: 30px;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }
    .referral-section {
      padding: 20px 16px;
      text-align: center;
    }
    .referral-block {
      background: #2d1b47;
      border-radius: 16px;
      padding: 24px 16px;
      margin-bottom: 20px;
    }
    .referral-title {
      font-size: 24px;
      margin: 0 0 12px;
      color: #a78bfa;
    }
    .referral-percent {
      font-size: 36px;
      font-weight: bold;
      color: #a78bfa;
    }
    .referral-text {
      font-size: 16px;
      color: #d1d5db;
      margin: 8px 0;
    }
    .action-btn {
      background: #a78bfa;
      color: black;
      padding: 16px;
      font-size: 18px;
      font-weight: bold;
      border: none;
      border-radius: 30px;
      width: 100%;
      margin: 12px 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .copy-btn {
      background: #3b82f6;
      color: white;
    }
    .stats {
      background: #1f2937;
      border-radius: 12px;
      padding: 16px;
      margin: 20px 0;
      text-align: center;
    }
    .stats-value {
      font-size: 28px;
      font-weight: bold;
      color: #a78bfa;
    }
    .referrals-list {
      background: #1f2937;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
    }
    .referrals-empty {
      font-size: 18px;
      color: #8b949e;
    }
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #161b22;
      border-top: 1px solid #30363d;
      display: flex;
      justify-content: space-around;
      padding: 10px 0;
      font-size: 12px;
    }
    .nav-item {
      text-align: center;
      cursor: pointer;
      color: #8b949e;
    }
    .nav-item.active {
      color: #a78bfa;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="back-btn" onclick="history.back()">←</div>
    <div class="title">Пригласить друзей</div>
    <div></div>
  </div>

  <div class="balance-section">
    <div class="balance-info">
      <div class="balance-icon">💎</div>
      <div>
        <div>Ваш баланс</div>
        <div class="balance-value">0.002</div>
      </div>
    </div>
    <button class="topup-btn">Пополнить</button>
  </div>

  <div class="referral-section">
    <div class="referral-block">
      <div class="referral-title">Получай <span class="referral-percent">10%</span></div>
      <p class="referral-text">приглашая друзей<br>С каждого их пополнения</p>
    </div>

    <button class="action-btn">↷ Пригласить друзей</button>
    <button class="action-btn copy-btn">📋 Скопировать реферальную ссылку</button>

    <div class="stats">
      <div>Всего заработано</div>
      <div class="stats-value">0.000 💎</div>
    </div>

    <div class="referrals-list">
      <div class="stats-value">Мои рефералы</div>
      <div class="referrals-empty">Пока нет приглашений</div>
    </div>
  </div>

  <div class="bottom-nav">
    <div class="nav-item" onclick="window.location.href='inventory.html'">Инвентарь</div>
    <div class="nav-item active" onclick="window.location.href='invite.html'">Пригласить</div>
    <div class="nav-item" onclick="window.location.href='index.html'">Главная</div>
    <div class="nav-item" onclick="window.location.href='rating.html'">Рейтинг</div>
    <div class="nav-item" onclick="window.location.href='rewards.html'">Награды</div>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();
  </script>
</body>
</html>
