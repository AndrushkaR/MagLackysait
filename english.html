<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LuckyChainss – TON Casino</title>
  <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
  <style>
    /* Тот же стиль, что и в index.html — не меняй */
  </style>
</head>
<body>

  <div class="header">
    <div class="avatar-container">
      <img id="userAvatar" class="avatar" src="https://via.placeholder.com/52?text=AVA" alt="Avatar">
      <div class="settings-badge" onclick="openSettings()">⚙️</div>
    </div>
    <div class="logo">LuckyChainss</div>
    <div class="balance">
      <strong id="tonBalance">0.000</strong> TON
    </div>
  </div>

  <button class="connect-btn" id="connectWallet">Connect TON Wallet</button>

  <div class="live-tabs">
    <div class="tab">Live</div>
    <div class="tab">💎</div>
    <div class="tab">💎</div>
    <div class="tab">Lucky</div>
    <div class="tab">Chain</div>
  </div>

  <div class="banner">
    <h2>LuckyChainss</h2>
    <p>The chain of luck starts here! 🚀🔗</p>
    <div style="font-size:32px;margin:10px 0;">🔗 x4.05 • x3.0 • x1.85 🔗</div>
  </div>

  <div class="cases">
    <div class="case-card">
      <img src="https://via.placeholder.com/300x180/FFD700/000?text=FREE24" alt="FREE24">
      <p>FREE24</p>
    </div>
    <div class="case-card">
      <img src="https://via.placeholder.com/300x180/FF69B4/000?text=EPIC+FREE" alt="FREE">
      <p>EPIC FREE</p>
    </div>
  </div>

  <div class="bottom-nav">
    <div class="nav-item" onclick="window.location.href='inventory-en.html'">Inventory</div>
    <div class="nav-item" onclick="window.location.href='invite.html'">Invite</div>
    <div class="nav-item active">Home</div>
    <div class="nav-item" onclick="window.location.href='rating.html'">Rating</div>
    <div class="nav-item" onclick="window.location.href='rewards.html'">Rewards</div>
  </div>

  <!-- Модалка настроек -->
  <div id="settingsModal">
    <div class="modal-content">
      <h3>Settings</h3>
      <p>Select language:</p>
      <button class="lang-btn" onclick="window.location.href='index.html'">Русский</button>
      <button class="lang-btn active" onclick="closeSettings()">English</button>
      <br><br>
      <button class="close-btn" onclick="closeSettings()">Close</button>
    </div>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    // Аватарка
    const user = tg.initDataUnsafe?.user || {};
    document.getElementById('userAvatar').src = user.photo_url || `https://via.placeholder.com/52/FFD700/000?text=${user.username?.[0]?.toUpperCase() || 'U'}`;

    function openSettings() { document.getElementById('settingsModal').style.display = 'flex'; }
    function closeSettings() { document.getElementById('settingsModal').style.display = 'none'; }
  </script>
</body>
</html>
