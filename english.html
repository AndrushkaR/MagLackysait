<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LuckyChainss – TON Casino</title>
  <style>
    /* Точно тот же CSS, что в русской версии — скопируй полностью из index.html выше */
    body { margin:0; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:#0d1117; color:white; overflow-x:hidden; }
    .header { background:#161b22; padding:12px 16px; display:flex; align-items:center; gap:12px; border-bottom:1px solid #30363d; }
    .avatar-container { position:relative; width:52px; height:52px; }
    .avatar { width:100%; height:100%; border-radius:50%; object-fit:cover; border:3px solid #FFD700; }
    .settings-badge { position:absolute; bottom:-4px; right:-4px; width:26px; height:26px; background:#161b22; border:3px solid #FFD700; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:16px; cursor:pointer; transition:0.2s; }
    .settings-badge:hover { transform:scale(1.2); background:#2d3748; }
    .logo { font-size:24px; font-weight:bold; color:#FFD700; text-shadow:0 0 10px #FFD70080; flex:1; }
    .balance { background:rgba(167,139,250,0.2); padding:8px 14px; border-radius:20px; font-size:15px; cursor:pointer; }
    .balance strong { color:#A78BFA; }
    .connect-btn { background:#FFD700; color:black; padding:14px 24px; border-radius:20px; font-weight:bold; border:none; cursor:pointer; width:90%; margin:16px auto; display:block; font-size:18px; }
    .connect-btn:disabled { background:#00ff88; color:#111; }
    .live-tabs { display:flex; overflow-x:auto; padding:12px 0; gap:12px; background:#0d1117; }
    .tab { background:rgba(255,215,0,0.15); color:#FFD700; padding:8px 18px; border-radius:20px; white-space:nowrap; font-weight:bold; border:1px solid #FFD700; cursor:pointer; }
    .banner { margin:16px; background:linear-gradient(135deg,#4B0082,#8A2BE2); border-radius:16px; padding:24px; text-align:center; position:relative; }
    .banner h2 { margin:0; font-size:28px; color:#FFD700; }
    .cases { display:grid; grid-template-columns:1fr 1fr; gap:12px; padding:16px; margin-bottom:90px; }
    .case-card { background:#1f2937; border-radius:12px; overflow:hidden; text-align:center; padding:12px; border:1px solid #FFD70050; cursor:pointer; }
    .case-card img { width:100%; height:140px; object-fit:cover; border-radius:8px; }
    .bottom-nav { position:fixed; bottom:0; left:0; right:0; background:#161b22; border-top:1px solid #30363d; display:flex; justify-content:space-around; padding:10px 0; font-size:12px; }
    .nav-item { text-align:center; cursor:pointer; color:#8b949e; }
    .nav-item.active { color:#FFD700; font-weight:bold; }
    #settingsModal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:1000; align-items:center; justify-content:center; }
    .modal-content { background:#1f2937; padding:28px; border-radius:16px; width:90%; max-width:360px; text-align:center; border:1px solid #FFD70040; }
    .modal-content h3 { color:#FFD700; margin:0 0 20px; font-size:22px; }
    .lang-btn { background:#30363d; color:white; border:none; padding:14px 28px; margin:8px; border-radius:12px; cursor:pointer; font-size:17px; min-width:120px; }
    .lang-btn.active { background:#FFD700; color:black; font-weight:bold; }
    .close-btn { margin-top:20px; background:#FF5555; color:white; border:none; padding:12px 32px; border-radius:12px; cursor:pointer; font-size:16px; }
  </style>
</head>
<body>

  <div class="header">
    <div class="avatar-container">
      <img id="userAvatar" class="avatar" src="https://via.placeholder.com/52?text=AVA" alt="Avatar">
      <div class="settings-badge" onclick="openSettings()">⚙️</div>
    </div>
    <div class="logo">LuckyChainss</div>
    <div class="balance" onclick="window.location.href='topup-en.html'">
      <strong>0.000</strong> TON
    </div>
  </div>

  <button class="connect-btn" id="connectWallet">Connect TON Wallet</button>

  <div class="live-tabs">
    <div class="tab">Live</div>
    <div class="tab">💎</div>
    <div class="tab">Lucky</div>
    <div class="tab">Chain</div>
  </div>

  <div class="banner">
    <h2>LuckyChainss</h2>
    <p>The chain of luck starts here! 🚀🔗</p>
    <div style="font-size:32px;margin:10px 0;">🔗 x4.05 • x3.0 • x1.85 🔗</div>
  </div>

  <div class="cases">
    <div class="case-card" onclick="window.location.href='daily-case-en.html'">
      <img src="gifs/free24.gif" alt="FREE24">
      <p>FREE24</p>
    </div>
    <div class="case-card" onclick="window.location.href='daily-case-en.html'">
      <img src="gifs/epic-free.gif" alt="EPIC FREE">
      <p>EPIC FREE</p>
    </div>
  </div>

  <div class="bottom-nav">
    <div class="nav-item" onclick="window.location.href='inventory-en.html'">Inventory</div>
    <div class="nav-item" onclick="window.location.href='invite-en.html'">Invite</div>
    <div class="nav-item active">Home</div>
    <div class="nav-item" onclick="window.location.href='rating-en.html'">Rating</div>
    <div class="nav-item" onclick="window.location.href='rewards-en.html'">Rewards</div>
  </div>

  <!-- Settings Modal -->
  <div id="settingsModal">
    <div class="modal-content">
      <h3>Settings</h3>
      <p>Select language:</p>
      <button class="lang-btn" onclick="window.location.href='index.html'">Russian</button>
      <button class="lang-btn active" onclick="closeSettings()">English</button>
      <br><br>
      <button class="close-btn" onclick="closeSettings()">Close</button>
    </div>
  </div>

 <script>
  const tg = window.Telegram.WebApp;
  tg.ready();
  tg.expand();

  const avatarElement = document.getElementById('userAvatar');

  // Список доступных аватарок
  const defaultAvatars = [
    'avatars/avatar1.png',
    'avatars/avatar2.png',
    'avatars/avatar3.png',
    'avatars/avatar4.png',
    'avatars/avatar5.png'
  ];

  // Пытаемся взять сохранённую
  let savedAvatar = localStorage.getItem('selectedAvatar');

  if (savedAvatar) {
    // Если есть сохранённая — используем её
    avatarElement.src = savedAvatar;
  } else {
    // Если нет — ставим случайную из списка
    const randomIndex = Math.floor(Math.random() * defaultAvatars.length);
    const randomAvatar = defaultAvatars[randomIndex];
    avatarElement.src = randomAvatar;
    localStorage.setItem('selectedAvatar', randomAvatar); // сразу сохраняем, чтобы не менялась каждый раз
  }

  // Если у пользователя есть фото в Telegram — можно переопределить (опционально)
  const user = tg.initDataUnsafe?.user || {};
  if (user.photo_url) {
    avatarElement.src = user.photo_url;
    localStorage.setItem('selectedAvatar', user.photo_url);
  }

  function openSettings() {
    document.getElementById('settingsModal').style.display = 'flex';
  }

  function closeSettings() {
    document.getElementById('settingsModal').style.display = 'none';
  }

  function selectAvatar(src) {
    avatarElement.src = src;
    localStorage.setItem('selectedAvatar', src);
    closeSettings(); // или closeAvatarModal(), если у тебя отдельная модалка аватарок
  }
</script>
</body>
</html>
