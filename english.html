<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LuckyChainss – TON Casino</title>
  <!-- Тот же CSS -->
</head>
<body>

  <!-- Тот же header, только ссылки на topup-en.html -->
  <div class="header">
    <div class="avatar-container">
      <img id="userAvatar" class="avatar" src="avatars/default-avatar.png" alt="Avatar">
      <div class="settings-badge" onclick="openSettings()">⚙️</div>
    </div>
    <div class="logo">LuckyChainss</div>
    <div class="balance" onclick="window.location.href='topup-en.html'">
      <strong>0.000</strong> TON
    </div>
  </div>

  <!-- Остальной контент такой же, как в русской версии -->

  <!-- Модалка настроек -->
  <div id="settingsModal">
    <div class="modal-content">
      <h3>Settings</h3>
      <p>Select language:</p>
      <button class="lang-btn" onclick="window.location.href='index.html'">Russian</button>
      <button class="lang-btn active" onclick="closeSettings()">English</button>
      <br><br>
      <button class="lang-btn" onclick="openAvatarModal()">Change Avatar</button>
      <br><br>
      <button class="close-btn" onclick="closeSettings()">Close</button>
    </div>
  </div>

  <!-- Модалка выбора аватарки -->
  <div id="avatarModal">
    <div class="modal-content">
      <h3>Choose Avatar</h3>
      <div style="display:flex; flex-wrap:wrap; justify-content:center; gap:12px; margin:20px 0;">
        <div class="avatar-option" onclick="selectAvatar('avatars/avatar1.png')"><img src="avatars/avatar1.png" alt="Avatar 1"></div>
        <div class="avatar-option" onclick="selectAvatar('avatars/avatar2.png')"><img src="avatars/avatar2.png" alt="Avatar 2"></div>
        <div class="avatar-option" onclick="selectAvatar('avatars/avatar3.png')"><img src="avatars/avatar3.png" alt="Avatar 3"></div>
        <div class="avatar-option" onclick="selectAvatar('avatars/avatar4.png')"><img src="avatars/avatar4.png" alt="Avatar 4"></div>
        <div class="avatar-option" onclick="selectAvatar('avatars/avatar5.png')"><img src="avatars/avatar5.png" alt="Avatar 5"></div>
      </div>
      <button class="close-btn" onclick="closeAvatarModal()">Close</button>
    </div>
  </div>

  <script>
    // Тот же скрипт, что в русской версии
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const avatarElement = document.getElementById('userAvatar');

    const defaultAvatar = 'avatars/default-avatar.png'; // ← та же аватарка по умолчанию

    let savedAvatar = localStorage.getItem('selectedAvatar');

    if (savedAvatar) {
      avatarElement.src = savedAvatar;
    } else {
      avatarElement.src = defaultAvatar;
      localStorage.setItem('selectedAvatar', defaultAvatar);
    }

    const user = tg.initDataUnsafe?.user || {};
    if (user.photo_url) {
      avatarElement.src = user.photo_url;
      localStorage.setItem('selectedAvatar', user.photo_url);
    }

    function openSettings() {
      document.getElementById('settingsModal').style.display = 'flex';
    }

    function closeSettings() {
      document.getElementById('settingsModal').style.display = 'none';
    }

    function openAvatarModal() {
      closeSettings();
      document.getElementById('avatarModal').style.display = 'flex';
    }

    function closeAvatarModal() {
      document.getElementById('avatarModal').style.display = 'none';
    }

    function selectAvatar(src) {
      avatarElement.src = src;
      localStorage.setItem('selectedAvatar', src);
      closeAvatarModal();
    }
  </script>
</body>
</html>
