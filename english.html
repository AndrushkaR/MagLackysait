<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LuckyChainss – TON Casino</title>
  <style>
    /* Полностью тот же CSS, что в русской версии выше */
  </style>
</head>
<body>

  <div class="header">
    <div class="avatar-container">
      <img id="userAvatar" class="avatar" src="https://via.placeholder.com/52?text=AVA" alt="Avatar">
      <div class="settings-badge" onclick="openSettings()">⚙️</div>
    </div>
    <div class="logo">LuckyChainss</div>
    <div class="balance" onclick="window.location.href='topup-en.html'">
      <strong>0.000</strong> TON
    </div>
  </div>

  <button class="connect-btn" id="connectWallet">Connect TON Wallet</button>

  <div class="live-tabs">
    <div class="tab">Live</div>
    <div class="tab">💎</div>
    <div class="tab">Lucky</div>
    <div class="tab">Chain</div>
  </div>

  <div class="banner">
    <h2>LuckyChainss</h2>
    <p>The chain of luck starts here! 🚀🔗</p>
    <div style="font-size:32px;margin:10px 0;">🔗 x4.05 • x3.0 • x1.85 🔗</div>
  </div>

  <div class="cases">
    <div class="case-card" onclick="window.location.href='daily-case-en.html'">
      <img src="gifs/free24.gif" alt="FREE24">
      <p>FREE24</p>
    </div>
    <div class="case-card" onclick="window.location.href='daily-case-en.html'">
      <img src="gifs/epic-free.gif" alt="EPIC FREE">
      <p>EPIC FREE</p>
    </div>
  </div>

  <div class="bottom-nav">
    <div class="nav-item" onclick="window.location.href='inventory-en.html'">Inventory</div>
    <div class="nav-item" onclick="window.location.href='invite-en.html'">Invite</div>
    <div class="nav-item active">Home</div>
    <div class="nav-item" onclick="window.location.href='rating-en.html'">Rating</div>
    <div class="nav-item" onclick="window.location.href='rewards-en.html'">Rewards</div>
  </div>

  <!-- Settings Modal -->
  <div id="settingsModal">
    <div class="modal-content">
      <h3>Settings</h3>
      <p>Select language:</p>
      <button class="lang-btn" onclick="window.location.href='index.html'">Russian</button>
      <button class="lang-btn active" onclick="closeSettings()">English</button>
      <br><br>
      <button class="close-btn" onclick="closeSettings()">Close</button>
    </div>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const savedAvatar = localStorage.getItem('selectedAvatar');
    if (savedAvatar) {
      document.getElementById('userAvatar').src = savedAvatar;
    } else {
      const user = tg.initDataUnsafe?.user || {};
      document.getElementById('userAvatar').src = user.photo_url || `https://via.placeholder.com/52/FFD700/000?text=${user.username?.[0]?.toUpperCase() || 'U'}`;
    }

    function openSettings() {
      document.getElementById('settingsModal').style.display = 'flex';
    }

    function closeSettings() {
      document.getElementById('settingsModal').style.display = 'none';
    }
  </script>
</body>
</html>
