<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LuckyChainss – Ежедневный кейс</title>
  <style>
    body { margin:0; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:#0d1117; color:white; padding-bottom:90px; }
    .header { background:#161b22; padding:12px 16px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid #30363d; }
    .back-btn { font-size:24px; color:#8b949e; cursor:pointer; }
    .title { font-size:18px; font-weight:bold; }
    .balance-section { padding:16px; display:flex; align-items:center; justify-content:space-between; background:#161b22; border-bottom:1px solid #30363d; }
    .balance-info { display:flex; align-items:center; gap:12px; }
    .balance-icon { width:48px; height:48px; border-radius:50%; background:linear-gradient(135deg, #a78bfa, #7c3aed); display:flex; align-items:center; justify-content:center; font-size:20px; }
    .balance-value { font-size:20px; font-weight:bold; color:#a78bfa; }
    .topup-btn { background:#a78bfa; color:black; padding:10px 20px; border-radius:30px; border:none; font-weight:bold; cursor:pointer; }
    .daily-case { margin:16px; background:#1f2937; border-radius:16px; padding:20px; border:1px solid #FFD70050; }
    .daily-title { font-size:22px; font-weight:bold; color:#FFD700; margin-bottom:16px; display:flex; align-items:center; gap:10px; }
    .daily-drops { margin:16px 0; }
    .drop-item { background:#2d3748; border-radius:12px; padding:16px; margin-bottom:12px; display:flex; align-items:center; gap:16px; }
    .drop-icon { width:56px; height:56px; background:#FFD700; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:28px; }
    .drop-info { flex:1; }
    .drop-name { font-size:18px; font-weight:bold; }
    .drop-value { font-size:16px; color:#a78bfa; font-weight:bold; }
    .drop-time { font-size:14px; color:#8b949e; margin-top:4px; }
    .timer-box { background:#2d1b47; border-radius:12px; padding:16px; text-align:center; margin:24px 0; }
    .timer-title { font-size:18px; margin-bottom:8px; }
    .timer { font-size:24px; font-weight:bold; color:#a78bfa; }
    .bottom-nav { position:fixed; bottom:0; left:0; right:0; background:#161b22; border-top:1px solid #30363d; display:flex; justify-content:space-around; padding:10px 0; font-size:12px; }
    .nav-item { text-align:center; cursor:pointer; color:#8b949e; }
    .nav-item.active { color:#a78bfa; font-weight:bold; }
  </style>
</head>
<body>

  <div class="header">
    <div class="back-btn" onclick="history.back()">←</div>
    <div class="title">Ежедневный кейс</div>
    <div></div>
  </div>

  <div class="balance-section">
    <div class="balance-info">
      <div class="balance-icon">💎</div>
      <div>
        <div>Ваш баланс</div>
        <div class="balance-value">0.000</div>
      </div>
    </div>
    <button class="topup-btn" onclick="window.location.href='topup.html'">Пополнить</button>
  </div>

  <div class="daily-case">
    <div class="daily-title">
      <span>📅</span> Ежедневный кейс – Последние ТОП дропы
    </div>

    <div class="daily-drops">
      <div class="drop-item">
        <div class="drop-icon">🍦</div>
        <div class="drop-info">
          <div class="drop-name">Ice Cream</div>
          <div class="drop-value">4.73 TON</div>
        </div>
        <div class="drop-time">1h ago</div>
      </div>
      <!-- Добавь остальные дропы по твоим скринам -->
      <div class="drop-item">
        <div class="drop-icon">🍰</div>
        <div class="drop-info">
          <div class="drop-name">Whip Cupcake</div>
          <div class="drop-value">4.66 TON</div>
        </div>
        <div class="drop-time">2h ago</div>
      </div>
      <!-- И так далее... -->
    </div>

    <div class="timer-box">
      <div class="timer-title">Возвращайтесь через</div>
      <div class="timer" id="dailyTimer">17h 7m 54s</div>
    </div>
  </div>

  <div class="bottom-nav">
    <div class="nav-item" onclick="window.location.href='inventory.html'">Инвентарь</div>
    <div class="nav-item" onclick="window.location.href='invite.html'">Пригласить</div>
    <div class="nav-item" onclick="window.location.href='index.html'">Главная</div>
    <div class="nav-item" onclick="window.location.href='rating.html'">Рейтинг</div>
    <div class="nav-item" onclick="window.location.href='rewards.html'">Награды</div>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    function startDailyTimer() {
      const endTime = new Date().getTime() + 24 * 60 * 60 * 1000; // 24 часа
      const timerEl = document.getElementById('dailyTimer');

      setInterval(() => {
        const now = new Date().getTime();
        const distance = endTime - now;

        if (distance < 0) {
          timerEl.innerHTML = "Кейс доступен!";
          return;
        }

        const hours = Math.floor(distance / (1000 * 60 * 60));
        const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((distance % (1000 * 60)) / 1000);

        timerEl.innerHTML = `${hours}h ${minutes}m ${seconds}s`;
      }, 1000);
    }

    startDailyTimer();
  </script>
</body>
</html>
