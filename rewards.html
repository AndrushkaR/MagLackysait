<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LuckyChainss – Награды</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0d1117;
      color: white;
      overflow-x: hidden;
      padding-bottom: 90px;
    }
    .header {
      background: #161b22;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #30363d;
    }
    .back-btn {
      font-size: 24px;
      color: #8b949e;
      cursor: pointer;
    }
    .title {
      font-size: 18px;
      font-weight: bold;
    }
    .balance-section {
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #161b22;
      border-bottom: 1px solid #30363d;
    }
    .balance-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .balance-icon {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, #a78bfa, #7c3aed);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }
    .balance-value {
      font-size: 20px;
      font-weight: bold;
      color: #a78bfa;
    }
    .topup-btn {
      background: #a78bfa;
      color: black;
      padding: 10px 20px;
      border-radius: 30px;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }
    .tabs {
      display: flex;
      margin: 16px;
      background: #1f2937;
      border-radius: 30px;
      overflow: hidden;
    }
    .tab-btn {
      flex: 1;
      padding: 12px;
      text-align: center;
      font-weight: bold;
      cursor: pointer;
      border: none;
      background: transparent;
      color: #8b949e;
    }
    .tab-btn.active {
      background: #a78bfa;
      color: black;
    }
    .tab-content {
      padding: 16px;
      display: none;
    }
    .tab-content.active {
      display: block;
    }
    .task-card {
      background: #1f2937;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .task-icon {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: #FFD700;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
    }
    .task-info {
      flex: 1;
    }
    .task-title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 4px;
    }
    .task-timer {
      font-size: 14px;
      color: #a78bfa;
    }
    .task-reward {
      font-size: 16px;
      color: #a78bfa;
      font-weight: bold;
    }
    .task-btn {
      background: #a78bfa;
      color: black;
      padding: 12px 24px;
      border-radius: 30px;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }
    .progress-bar {
      background: #2d3748;
      border-radius: 30px;
      height: 8px;
      margin: 12px 0;
      overflow: hidden;
    }
    .progress-fill {
      background: #a78bfa;
      height: 100%;
      width: 0%;
      border-radius: 30px;
      transition: width 0.5s;
    }
    .progress-text {
      text-align: center;
      font-size: 14px;
      color: #d1d5db;
      margin-top: 4px;
    }
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #161b22;
      border-top: 1px solid #30363d;
      display: flex;
      justify-content: space-around;
      padding: 10px 0;
      font-size: 12px;
    }
    .nav-item {
      text-align: center;
      cursor: pointer;
      color: #8b949e;
    }
    .nav-item.active {
      color: #a78bfa;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="back-btn" onclick="history.back()">←</div>
    <div class="title">Награды</div>
    <div></div>
  </div>

  <div class="balance-section">
    <div class="balance-info">
      <div class="balance-icon">💎</div>
      <div>
        <div>Ваш баланс</div>
        <div class="balance-value">0.002</div>
      </div>
    </div>
    <button class="topup-btn">Пополнить</button>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="openTab('tasks')">Задания</button>
    <button class="tab-btn" onclick="openTab('giveaways')">Розыгрыши</button>
  </div>

  <div id="tasks" class="tab-content active">
    <div class="task-card">
      <div class="task-icon">🎁</div>
      <div class="task-info">
        <div class="task-title">Open 1 Black Box</div>
        <div class="task-timer">Осталось: 22h 6m</div>
      </div>
      <div style="text-align:right;">
        <div class="task-reward">+4.00 💎</div>
        <button class="task-btn">Перейти</button>
      </div>
    </div>

    <div class="task-card">
      <div class="task-icon">🎁</div>
      <div class="task-info">
        <div class="task-title">Open 1 Onyx Black Box</div>
        <div class="task-timer">Осталось: 22h 6m</div>
      </div>
      <div style="text-align:right;">
        <div class="task-reward">+1.00 💎</div>
        <button class="task-btn">Перейти</button>
      </div>
    </div>

    <div class="task-card">
      <div class="task-icon">⏰</div>
      <div class="task-info">
        <div class="task-title">Complete 25 Limited Tasks</div>
        <div class="progress-bar">
          <div class="progress-fill" style="width:0%;"></div>
        </div>
        <div class="progress-text">Progress: 0/25 (25 remaining)</div>
      </div>
      <div style="text-align:right;">
        <div class="task-reward">+0.50 💎</div>
        <button class="task-btn">Start</button>
      </div>
    </div>
  </div>

  <div id="giveaways" class="tab-content">
    <div style="text-align:center; padding:40px 16px; color:#8b949e;">
      Пока нет активных розыгрышей<br>Следите за обновлениями!
    </div>
  </div>

  <div class="bottom-nav">
    <div class="nav-item" onclick="window.location.href='inventory.html'">Инвентарь</div>
    <div class="nav-item" onclick="window.location.href='invite.html'">Пригласить</div>
    <div class="nav-item" onclick="window.location.href='index.html'">Главная</div>
    <div class="nav-item" onclick="window.location.href='rating.html'">Рейтинг</div>
    <div class="nav-item active" onclick="window.location.href='rewards.html'">Награды</div>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    function openTab(tabId) {
      document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      document.getElementById(tabId).classList.add('active');
      document.querySelector(`button[onclick="openTab('${tabId}')"]`).classList.add('active');
    }
  </script>
</body>
</html>
