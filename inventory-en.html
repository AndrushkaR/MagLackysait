<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LuckyChainss – Inventory</title>
  <style>
    /* Тот же CSS, что и в русской версии — скопируй полностью из предыдущего кода */
  </style>
</head>
<body>

  <div class="header">
    <div class="avatar-container">
      <img id="userAvatar" class="avatar" src="https://via.placeholder.com/52?text=AVA" alt="Avatar">
      <div class="settings-badge" onclick="openSettings()">⚙️</div>
    </div>
    <div class="logo">LuckyChainss</div>
    <div class="balance" onclick="window.location.href='topup-en.html'">
      <strong>0.000</strong> TON
    </div>
  </div>

  <div class="inventory-list">
    <div class="inventory-item">
      <div class="item-icon">🎁</div>
      <div class="item-info">
        <div class="item-name">Black Box</div>
        <div class="item-desc">Rare gift</div>
      </div>
      <div class="item-value">4.00 TON</div>
    </div>
    <div class="inventory-item">
      <div class="item-icon">💎</div>
      <div class="item-info">
        <div class="item-name">Onyx Gift</div>
        <div class="item-desc">Epic item</div>
      </div>
      <div class="item-value">1.00 TON</div>
    </div>
    <div class="inventory-item">
      <div class="item-icon">🏆</div>
      <div class="item-info">
        <div class="item-name">Empty</div>
        <div class="item-desc">No items yet</div>
      </div>
      <div class="item-value">—</div>
    </div>
    <!-- Add your items here -->
  </div>

  <div class="bottom-nav">
    <div class="nav-item active" onclick="window.location.href='inventory-en.html'">Inventory</div>
    <div class="nav-item" onclick="window.location.href='invite-en.html'">Invite</div>
    <div class="nav-item" onclick="window.location.href='english.html'">Home</div>
    <div class="nav-item" onclick="window.location.href='rating-en.html'">Rating</div>
    <div class="nav-item" onclick="window.location.href='rewards-en.html'">Rewards</div>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const savedAvatar = localStorage.getItem('selectedAvatar');
    if (savedAvatar) {
      document.getElementById('userAvatar').src = savedAvatar;
    } else {
      const user = tg.initDataUnsafe?.user || {};
      document.getElementById('userAvatar').src = user.photo_url || `https://via.placeholder.com/52/FFD700/000?text=${user.username?.[0]?.toUpperCase() || 'U'}`;
    }
  </script>
</body>
</html>
